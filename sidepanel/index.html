<!doctype html>
<html>
  <head>
    <link rel="stylesheet" type="text/css" href="index.css" />
  </head>
  <body>
    <h2>Flow Comment Rewriter (Demo)</h2>
    <p class="hint">
      Opens the active Flow Production Tracking page, detects a writable comment field,
      and rewrites its current text using local Gemini Nano.
    </p>

    <textarea
      id="rewrite-instruction"
      placeholder='Rewrite style, e.g. "Make this concise and professional."'
      cols="30"
      rows="3"
    >Make this clear, concise, and professional while preserving meaning.</textarea>
    <button id="button-rewrite" class="primary">Rewrite active comment</button>

    <div id="status" class="text" hidden></div>

    <hr />

    <textarea
      id="input-prompt"
      placeholder='Type something, e.g. "Write a haiku about Chrome Extensions"'
      cols="30"
      rows="5"
    ></textarea>
    <div>
      <input
        type="range"
        id="temperature"
        name="temperature"
        min="0"
        max="2"
        step="0.01"
      />
      <label for="temperature"
        >Temperature: <span id="label-temperature"></span
      ></label>
    </div>
    <div>
      <input type="range" id="top-k" name="top-k" min="1" max="8" step="1" />
      <label for="top-k">Top-k: <span id="label-top-k"></span></label>
    </div>
    <button id="button-prompt" class="primary" disabled>Run</button>
    <button id="button-reset" class="secondary" disabled>Reset</button>
    <div id="response" class="text" hidden></div>
    <div id="loading" class="text" hidden><span class="blink">...</span></div>
    <div id="error" class="text" hidden></div>
    <script src="index.js" type="module"></script>
  </body>
</html>
