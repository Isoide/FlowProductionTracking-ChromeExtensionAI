<!doctype html>
<html>
  <head>
    <link rel="stylesheet" type="text/css" href="index.css" />
  </head>
  <body>
    <h2>Flow Feedback Organizer</h2>
    <p class="hint">
      Paste messy supervisor feedback, then click convert. The cleaned result is inserted
      into the active Flow comment box.
    </p>

    <textarea
      id="input-feedback"
      placeholder="Paste supervisor notes here..."
      cols="30"
      rows="10"
    ></textarea>

    <button id="button-convert" class="primary" disabled>Convert and fill active comment</button>

    <div id="status" class="text" hidden></div>

    <script src="index.js" type="module"></script>
  </body>
</html>
